event:
  min-players: 2
  max-players: 20
  countdown-seconds: 15
  duration-seconds: 600

  ready-check:
    enabled: true
    timeout-seconds: 25

  win-conditions:
    vampires-win-on-timeout: false
    hunters-win-when-all-vampires-dead: true
    vampires-win-when-all-hunters-converted: true

  blocked-commands:
    - spawn
    - home
    - warp
    - tpa
    - tpaccept
    - tpdeny
    - rtp
    - back
    - kit

  allowed-commands:
    - vhunt
    - vampirehunt
    - bloodhunt
    - vh

  disable-chorus-fruit: true
  disable-elytra: true
  disable-tridents: true
  disable-natural-regen: true

  friendly-fire:
    same-role: true

  roles:
    initial-vampires: 1

  disconnect:
    grace-enabled: true
    grace-seconds: 20
    eliminate-if-not-back: true

  spectator:
    enabled: true
    block-teleport-escape: true
    allowed-commands:
      - vhunt
      - vampirehunt
      - bloodhunt
      - vh

  rewards:
    economy:
      enabled: true
      amount: 250.0

  tracking:
    tick-interval: 10

  horror:
    darkness-pulses:
      enabled: true
      seconds: 2
      amplifier: 0
      slowness-seconds: 1

    heartbeat:
      enabled: true

    threat-titles:
      enabled: true
      proximity-radius: 12.0

    ambient:
      enabled: true
      interval-ticks: 100
      thunder: true
      bats: true

  progression:
    titles:
      night-stalker:
        enabled: true
        required-vampire-kills: 15
      first-blood:
        enabled: true
        required-wins: 1
      hunter-slayer:
        enabled: true
        required-hunter-kills: 15
      last-survivor:
        enabled: true
        required-best-win-streak: 3

  # ── Classes & Auto-Abilities ─────────────────────────────────────────────
  classes:

    vampire-stalker:
      bonus-invisibility-seconds: 15
      auto-ability:
        cooldown-seconds: 30
        range: 40.0
        glow-seconds: 10

    vampire-brute:
      enabled: true
      auto-ability:
        cooldown-seconds: 40
        duration-seconds: 8
        strength-amplifier: 1    # 1 = Strength II
        speed-amplifier: 0       # 0 = Speed I

    hunter-tracker:
      bonus-radius: 20.0
      auto-ability:
        cooldown-seconds: 30
        range: 40.0
        glow-seconds: 10

    hunter-priest:
      enabled: true
      auto-ability:
        cooldown-seconds: 35
        duration-seconds: 8
        speed-amplifier: 1       # 1 = Speed II
        resistance-amplifier: 0  # 0 = Resistance I

  kill-effects:
    red-particles: true
    screen-shake: true
    lightning-visual: true
    special-broadcast: true

  # ── Hunter Directional HUD ───────────────────────────────────────────────
  hunter-tracker:
    enabled: true
    interval-ticks: 10
    radius: 30.0

  # ── Vampire Blood Sense HUD ──────────────────────────────────────────────
  vampire-tracking:
    opening-reveal:
      enabled: false          # Fog of War is default — no opening reveal
      glow-all-hunters: false
      duration-seconds: 1

    blood-scent:
      enabled: true
      cooldown-seconds: 20
      duration-seconds: 7
      radius: 150.0
      use-compass: false        # Compass disabled — HUD only
      use-actionbar: true       # Directional HUD via actionbar

    anti-camp:
      enabled: true
      no-move-seconds: 10
      required-movement-blocks: 12.0
      glow-seconds: 3
      reveal-cooldown-seconds: 20
      use-bossbar-alert: true
      damage-final-stage: true

  hunter-bow:
    enabled: true
    material: BOW
    arrows: 24
    enchantments:
      power: 2
      punch: 0
      flame: 0
      infinity: 0

  vampire:
    start-invisibility:
      enabled: true
      seconds: 15              # Base invisibility; stalker gets +15 via bonus-invisibility-seconds

    invisibility-on-kill: true
    invisibility-seconds: 30

    attack-effects:
      dizziness:
        enabled: true
        seconds: 2
        amplifier: 0
        chance-percent: 100.0
        cooldown-seconds: 0
        ambient: false
        particles: false
        icon: true
        notify-hunter: true
        notify-vampire: false

  vote-modifiers:
    vote-duration-seconds: 30
    double-vampires:
      enabled: true
      display-name: "Double Vampires"
      description: "Initial vampire count is doubled for the next round."
    no-compass:
      enabled: true
      display-name: "No Compass"
      description: "Hunter tracker compasses are disabled for the next round."
    sudden-death:
      enabled: true
      display-name: "Sudden Death Start"
      description: "Round timer is halved and starts in sudden-death immediately."
    fog-of-war:
      enabled: true
      display-name: "Fog of War"
      description: "Vampires opening reveal is skipped — hunters start blind."

  # ── Kits ──────────────────────────────────────────────────────────────────
  # Use plain material names only (no Bukkit serialization blocks).
  # All names must be valid 1.13+ Material enum values.
  kits:
    vampire:
      armor:
        helmet: LEATHER_HELMET
        chestplate: LEATHER_CHESTPLATE
        leggings: LEATHER_LEGGINGS
        boots: LEATHER_BOOTS
      # Armor dye color for leather (0–255 per channel)
      armor-color:
        red: 0
        green: 0
        blue: 0       # Pure black

      offhand: TOTEM_OF_UNDYING

      slots:
        0: IRON_SWORD:1
        1: COOKED_BEEF:16

      effects:
        NIGHT_VISION:
          amplifier: 0
          duration-seconds: 999999
          ambient: false
          particles: false
          icon: true

    hunter:
      armor:
        helmet: IRON_HELMET
        chestplate: IRON_CHESTPLATE
        leggings: IRON_LEGGINGS
        boots: IRON_BOOTS

      offhand: null

      slots:
        0: IRON_SWORD:1
        1: BOW:1
        2: ARROW:24
        3: COOKED_BEEF:16
        # Slot 3 previously had COMPASS:1 — removed, tracker is HUD-only now

      effects: {}
      # SPEED removed — hunters receive no permanent potion effects by design

