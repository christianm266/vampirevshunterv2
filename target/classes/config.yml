event:
  min-players: 2
  max-players: 20
  countdown-seconds: 15
  duration-seconds: 600

  blocked-commands:
    - spawn
    - home
    - warp
    - tpa
    - tpaccept
    - tpdeny
    - rtp
    - back
    - kit

  roles:
    initial-vampires: 1

  disconnect:
    grace-enabled: true
    grace-seconds: 20
    eliminate-if-not-back: true

  spectator:
    enabled: true

  rewards:
    economy:
      enabled: true
      amount: 250.0

  tracking:
    tick-interval: 20

  hunter-tracker:
    enabled: true
    interval-ticks: 20
    radius: 30.0

  vampire:
    start-invisibility:
      enabled: true
      seconds: 60

    invisibility-on-kill: true
    invisibility-seconds: 30

    attack-effects:
      dizziness:
        enabled: true
        seconds: 2
        amplifier: 0
        chance-percent: 100.0
        cooldown-seconds: 0
        ambient: false
        particles: false
        icon: true
        notify-hunter: true
        notify-vampire: false

  vampire-tracking:
    opening-reveal:
      enabled: true
      glow-all-hunters: true
      duration-seconds: 1

    blood-scent:
      enabled: true
      cooldown-seconds: 20
      duration-seconds: 7
      radius: 150.0
      use-compass: true
      use-actionbar: true

    anti-camp:
      enabled: true
      no-move-seconds: 10
      required-movement-blocks: 12.0
      glow-seconds: 3
      reveal-cooldown-seconds: 20
      use-bossbar-alert: true

  kits:
    vampire:
      armor:
        helmet:
          ==: org.bukkit.inventory.ItemStack
          type: LEATHER_HELMET
        chestplate:
          ==: org.bukkit.inventory.ItemStack
          type: LEATHER_CHESTPLATE
        leggings:
          ==: org.bukkit.inventory.ItemStack
          type: LEATHER_LEGGINGS
        boots:
          ==: org.bukkit.inventory.ItemStack
          type: LEATHER_BOOTS

      offhand:
        ==: org.bukkit.inventory.ItemStack
        type: TOTEM_OF_UNDYING

      items:
        - ==: org.bukkit.inventory.ItemStack
          type: IRON_SWORD
          amount: 1
        - ==: org.bukkit.inventory.ItemStack
          type: COOKED_BEEF
          amount: 16

      slots:
        "0":
          ==: org.bukkit.inventory.ItemStack
          type: IRON_SWORD
          amount: 1
        "1":
          ==: org.bukkit.inventory.ItemStack
          type: COOKED_BEEF
          amount: 16

      effects:
        SPEED:
          amplifier: 2
          duration-seconds: 999999
          ambient: false
          particles: false
          icon: true
        NIGHT_VISION:
          amplifier: 0
          duration-seconds: 999999
          ambient: false
          particles: false
          icon: true

    hunter:
      armor:
        helmet:
          ==: org.bukkit.inventory.ItemStack
          type: IRON_HELMET
        chestplate:
          ==: org.bukkit.inventory.ItemStack
          type: IRON_CHESTPLATE
        leggings:
          ==: org.bukkit.inventory.ItemStack
          type: IRON_LEGGINGS
        boots:
          ==: org.bukkit.inventory.ItemStack
          type: IRON_BOOTS

      offhand: null

      items:
        - ==: org.bukkit.inventory.ItemStack
          type: IRON_SWORD
          amount: 1
        - ==: org.bukkit.inventory.ItemStack
          type: BOW
          amount: 1
        - ==: org.bukkit.inventory.ItemStack
          type: ARROW
          amount: 24
        - ==: org.bukkit.inventory.ItemStack
          type: COOKED_BEEF
          amount: 16

      slots:
        "0":
          ==: org.bukkit.inventory.ItemStack
          type: IRON_SWORD
          amount: 1
        "1":
          ==: org.bukkit.inventory.ItemStack
          type: BOW
          amount: 1
        "2":
